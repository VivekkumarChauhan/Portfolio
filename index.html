<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vivekkumar Chauhan | AI & Data Science Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --gold: #c9a84c;
    --gold-light: #f0c96e;
    --gold-dim: rgba(201,168,76,0.15);
    --text: #e8e4d9;
    --muted: #7a7870;
    --accent: #4fa3e0;
    --accent2: #e06b6b;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom Cursor */
  .cursor {
    width: 12px; height: 12px;
    background: var(--gold);
    border-radius: 50%;
    position: fixed; top:0; left:0;
    pointer-events: none; z-index: 9999;
    transition: transform 0.15s ease;
    mix-blend-mode: difference;
  }
  .cursor-follower {
    width: 36px; height: 36px;
    border: 1.5px solid var(--gold);
    border-radius: 50%;
    position: fixed; top:0; left:0;
    pointer-events: none; z-index: 9998;
    transition: transform 0.4s ease, width 0.3s, height 0.3s, opacity 0.3s;
    opacity: 0.5;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.2rem 3rem;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(201,168,76,0.1);
    transition: all 0.3s;
  }
  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 900;
    letter-spacing: 2px;
    color: var(--gold);
  }
  .nav-logo span { color: var(--text); }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a {
    font-size: 0.82rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.3s;
    position: relative;
  }
  .nav-links a::after {
    content: '';
    position: absolute; bottom: -4px; left: 0;
    width: 0; height: 1px;
    background: var(--gold);
    transition: width 0.3s;
  }
  .nav-links a:hover { color: var(--gold); }
  .nav-links a:hover::after { width: 100%; }
  .nav-contact {
    padding: 0.6rem 1.5rem;
    border: 1px solid var(--gold);
    color: var(--gold);
    text-decoration: none;
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.3s;
  }
  .nav-contact:hover {
    background: var(--gold);
    color: var(--bg);
  }

  /* HERO */
  #home {
    min-height: 100vh;
    display: flex; align-items: center;
    padding: 7rem 3rem 3rem;
    position: relative;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 70% 50%, rgba(201,168,76,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 80% at 20% 80%, rgba(79,163,224,0.04) 0%, transparent 60%);
  }
  .hero-grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }
  .hero-content {
    max-width: 1200px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 4rem; align-items: center;
    position: relative; z-index: 1;
  }
  .hero-tag {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    font-size: 0.75rem; letter-spacing: 2px;
    text-transform: uppercase;
    padding: 0.4rem 1rem; margin-bottom: 1.5rem;
    opacity: 0; transform: translateY(20px);
    animation: fadeUp 0.8s 0.2s forwards;
  }
  .hero-tag::before {
    content: ''; width: 6px; height: 6px;
    background: var(--gold); border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }
  .hero-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 6vw, 5.5rem);
    font-weight: 900;
    line-height: 1.05;
    margin-bottom: 0.3rem;
    opacity: 0; transform: translateY(30px);
    animation: fadeUp 0.8s 0.4s forwards;
  }
  .hero-name .gold { color: var(--gold); }
  .hero-subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 1.5rem;
    opacity: 0; transform: translateY(20px);
    animation: fadeUp 0.8s 0.6s forwards;
  }
  .hero-desc {
    font-size: 1rem;
    line-height: 1.8;
    color: var(--muted);
    max-width: 500px;
    margin-bottom: 2.5rem;
    opacity: 0; transform: translateY(20px);
    animation: fadeUp 0.8s 0.8s forwards;
  }
  .hero-buttons {
    display: flex; gap: 1rem; flex-wrap: wrap;
    opacity: 0; transform: translateY(20px);
    animation: fadeUp 0.8s 1s forwards;
  }
  .btn-primary {
    padding: 0.9rem 2.5rem;
    background: var(--gold);
    color: var(--bg);
    text-decoration: none;
    font-size: 0.82rem; letter-spacing: 2px;
    text-transform: uppercase; font-weight: 600;
    transition: all 0.3s; position: relative; overflow: hidden;
  }
  .btn-primary::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--gold-light);
    transform: translateX(-100%);
    transition: transform 0.3s;
  }
  .btn-primary:hover::before { transform: translateX(0); }
  .btn-primary span { position: relative; z-index: 1; }
  .btn-outline {
    padding: 0.9rem 2.5rem;
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold);
    text-decoration: none;
    font-size: 0.82rem; letter-spacing: 2px;
    text-transform: uppercase; font-weight: 600;
    transition: all 0.3s;
  }
  .btn-outline:hover {
    border-color: var(--gold);
    background: var(--gold-dim);
  }

  /* Hero Right - Visual */
  .hero-visual {
    position: relative;
    opacity: 0; transform: translateX(40px);
    animation: fadeLeft 1s 0.5s forwards;
  }
  @keyframes fadeLeft {
    to { opacity: 1; transform: translateX(0); }
  }
  .hero-card-main {
    background: var(--card);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 2.5rem;
    position: relative;
    overflow: hidden;
  }
  .hero-card-main::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    animation: shimmer 3s infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1.5rem; margin-top: 1.5rem;
  }
  .stat-item { text-align: center; }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem; font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }
  .stat-label { font-size: 0.75rem; color: var(--muted); letter-spacing: 1px; margin-top: 0.3rem; }

  .floating-badge {
    position: absolute;
    background: var(--surface);
    border: 1px solid rgba(201,168,76,0.3);
    padding: 0.7rem 1.2rem;
    font-size: 0.75rem;
    color: var(--gold);
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .badge-1 { top: -1rem; right: -1rem; animation: float 4s ease-in-out infinite; }
  .badge-2 { bottom: -1rem; left: -1rem; animation: float 4s ease-in-out 2s infinite; }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Social Links Hero */
  .hero-socials {
    display: flex; gap: 1rem; margin-top: 2rem;
    opacity: 0; animation: fadeUp 0.8s 1.2s forwards;
  }
  .social-link {
    width: 40px; height: 40px;
    border: 1px solid rgba(201,168,76,0.3);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    text-decoration: none; font-size: 0.9rem;
    transition: all 0.3s;
  }
  .social-link:hover {
    border-color: var(--gold); color: var(--gold);
    background: var(--gold-dim);
    transform: translateY(-3px);
  }

  /* SECTION COMMONS */
  section { padding: 6rem 3rem; }
  .section-header { text-align: center; margin-bottom: 4rem; }
  .section-tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem; letter-spacing: 3px;
    text-transform: uppercase; color: var(--gold);
    margin-bottom: 0.8rem; display: block;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 5vw, 4rem);
    font-weight: 900;
    line-height: 1.1;
    color: var(--text);
  }
  .section-title .outline {
    -webkit-text-stroke: 1px var(--gold);
    color: transparent;
  }
  .section-divider {
    width: 60px; height: 2px;
    background: linear-gradient(90deg, var(--gold), transparent);
    margin: 1.5rem auto 0;
  }

  /* ABOUT */
  #about { background: var(--surface); }
  .about-grid {
    max-width: 1200px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr 1.2fr;
    gap: 5rem; align-items: center;
  }
  .about-left { position: relative; }
  .about-img-frame {
    position: relative; display: inline-block;
  }
  .about-img-frame::before {
    content: '';
    position: absolute; top: 20px; left: 20px; right: -20px; bottom: -20px;
    border: 1px solid rgba(201,168,76,0.3);
    z-index: 0;
  }
  .about-placeholder {
    width: 380px; height: 460px;
    background: var(--card);
    border: 1px solid rgba(201,168,76,0.2);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 5rem; font-weight: 900;
    color: var(--gold);
    position: relative; z-index: 1;
    overflow: hidden;
  }
  .about-placeholder::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.05) 0%, transparent 60%);
  }
  .about-placeholder small {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem; color: var(--muted);
    letter-spacing: 2px; margin-top: 0.5rem;
  }
  .about-text h3 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem; margin-bottom: 1.5rem;
  }
  .about-text p { color: var(--muted); line-height: 1.9; margin-bottom: 1.2rem; font-size: 0.95rem; }
  .about-highlights {
    display: flex; flex-wrap: wrap; gap: 0.6rem; margin-top: 2rem;
  }
  .highlight-chip {
    padding: 0.4rem 1rem;
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.25);
    color: var(--gold);
    font-size: 0.78rem; letter-spacing: 1px;
  }

  /* SKILLS */
  #skills { background: var(--bg); }
  .skills-container { max-width: 1200px; margin: 0 auto; }
  .skills-categories {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
  }
  .skill-category {
    background: var(--card);
    border: 1px solid rgba(201,168,76,0.1);
    padding: 2rem;
    transition: all 0.4s;
    position: relative; overflow: hidden;
  }
  .skill-category::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 3px; height: 0;
    background: var(--gold);
    transition: height 0.4s;
  }
  .skill-category:hover { border-color: rgba(201,168,76,0.3); transform: translateY(-4px); }
  .skill-category:hover::before { height: 100%; }
  .skill-cat-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem; letter-spacing: 2px;
    text-transform: uppercase; color: var(--gold);
    margin-bottom: 1.2rem;
  }
  .skill-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .skill-tag {
    padding: 0.3rem 0.8rem;
    background: rgba(201,168,76,0.05);
    border: 1px solid rgba(201,168,76,0.15);
    font-size: 0.78rem; color: var(--text);
    transition: all 0.3s;
  }
  .skill-tag:hover {
    background: var(--gold-dim);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* EXPERIENCE */
  #experience { background: var(--surface); }
  .exp-container { max-width: 900px; margin: 0 auto; }
  .timeline { position: relative; padding-left: 3rem; }
  .timeline::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
  }
  .timeline-item {
    position: relative; margin-bottom: 3rem;
    opacity: 0; transform: translateX(-20px);
    transition: all 0.6s ease;
  }
  .timeline-item.visible { opacity: 1; transform: translateX(0); }
  .timeline-dot {
    position: absolute; left: -3.4rem; top: 0.3rem;
    width: 14px; height: 14px;
    background: var(--bg);
    border: 2px solid var(--gold);
    border-radius: 50%;
    transition: all 0.3s;
  }
  .timeline-item:hover .timeline-dot {
    background: var(--gold);
    box-shadow: 0 0 15px rgba(201,168,76,0.5);
  }
  .timeline-date {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem; color: var(--gold);
    letter-spacing: 2px; margin-bottom: 0.5rem;
  }
  .timeline-card {
    background: var(--card);
    border: 1px solid rgba(201,168,76,0.1);
    padding: 1.8rem;
    transition: all 0.3s;
  }
  .timeline-card:hover { border-color: rgba(201,168,76,0.3); }
  .timeline-role {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem; margin-bottom: 0.3rem;
  }
  .timeline-company {
    color: var(--gold); font-size: 0.85rem;
    letter-spacing: 1px; margin-bottom: 1rem;
  }
  .timeline-desc { color: var(--muted); font-size: 0.9rem; line-height: 1.8; }

  /* PROJECTS */
  #projects { background: var(--bg); }
  .projects-grid {
    max-width: 1200px; margin: 0 auto;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 1.5rem;
  }
  .project-card {
    background: var(--card);
    border: 1px solid rgba(201,168,76,0.1);
    overflow: hidden;
    transition: all 0.4s;
    position: relative;
    opacity: 0; transform: translateY(30px);
    transition: opacity 0.6s ease, transform 0.6s ease, border-color 0.3s, box-shadow 0.3s;
  }
  .project-card.visible { opacity: 1; transform: translateY(0); }
  .project-card:hover {
    border-color: rgba(201,168,76,0.4);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 30px rgba(201,168,76,0.05);
    transform: translateY(-6px);
  }
  .project-img {
    height: 200px;
    background: linear-gradient(135deg, var(--surface) 0%, var(--card) 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem; position: relative; overflow: hidden;
  }
  .project-img::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 50%, var(--card));
  }
  .project-body { padding: 1.8rem; }
  .project-meta {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem; color: var(--gold);
    letter-spacing: 2px; margin-bottom: 0.7rem;
  }
  .project-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem; margin-bottom: 0.8rem;
  }
  .project-desc { color: var(--muted); font-size: 0.85rem; line-height: 1.7; margin-bottom: 1.2rem; }
  .project-tech { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .tech-badge {
    padding: 0.25rem 0.6rem;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    font-size: 0.7rem; color: var(--gold);
    letter-spacing: 0.5px;
  }

  /* ACHIEVEMENTS */
  #achievements { background: var(--surface); }
  .achievements-grid {
    max-width: 1200px; margin: 0 auto;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
  }
  .achievement-card {
    background: var(--card);
    border: 1px solid rgba(201,168,76,0.1);
    padding: 2rem;
    position: relative; overflow: hidden;
    transition: all 0.4s;
    opacity: 0; transform: scale(0.95);
    transition: opacity 0.5s, transform 0.5s, border-color 0.3s;
  }
  .achievement-card.visible { opacity: 1; transform: scale(1); }
  .achievement-card:hover { border-color: rgba(201,168,76,0.4); transform: translateY(-4px); }
  .achievement-icon {
    font-size: 2.5rem; margin-bottom: 1rem;
    display: block;
  }
  .achievement-badge {
    position: absolute; top: 1rem; right: 1rem;
    padding: 0.3rem 0.7rem;
    background: var(--gold);
    color: var(--bg);
    font-size: 0.65rem; letter-spacing: 1px;
    font-weight: 700; text-transform: uppercase;
  }
  .achievement-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; margin-bottom: 0.5rem;
  }
  .achievement-org {
    font-size: 0.8rem; color: var(--gold);
    letter-spacing: 1px; margin-bottom: 0.8rem;
  }
  .achievement-desc { color: var(--muted); font-size: 0.85rem; line-height: 1.7; }

  /* EDUCATION */
  #education { background: var(--bg); }
  .education-grid {
    max-width: 1100px; margin: 0 auto;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1.5rem;
  }
  .edu-card {
    background: var(--card);
    border: 1px solid rgba(201,168,76,0.1);
    padding: 2.5rem;
    text-align: center;
    transition: all 0.4s;
    position: relative; overflow: hidden;
  }
  .edu-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.03) 0%, transparent 60%);
    opacity: 0; transition: opacity 0.4s;
  }
  .edu-card:hover { border-color: rgba(201,168,76,0.35); transform: translateY(-5px); }
  .edu-card:hover::before { opacity: 1; }
  .edu-icon { font-size: 2.5rem; margin-bottom: 1.2rem; display: block; }
  .edu-degree {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; color: var(--gold);
    margin-bottom: 0.5rem; line-height: 1.4;
  }
  .edu-school { font-size: 0.9rem; margin-bottom: 0.5rem; }
  .edu-dates { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--muted); }
  .edu-note {
    display: inline-block; margin-top: 0.8rem;
    padding: 0.3rem 0.8rem;
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.25);
    font-size: 0.75rem; color: var(--gold);
  }

  /* RESEARCH */
  #research { background: var(--surface); }
  .research-list { max-width: 900px; margin: 0 auto; }
  .research-item {
    display: flex; gap: 2rem; align-items: flex-start;
    padding: 2rem;
    background: var(--card);
    border: 1px solid rgba(201,168,76,0.1);
    margin-bottom: 1rem;
    transition: all 0.3s;
  }
  .research-item:hover { border-color: rgba(201,168,76,0.3); transform: translateX(6px); }
  .research-num {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem; font-weight: 900;
    color: rgba(201,168,76,0.2); flex-shrink: 0;
    line-height: 1;
  }
  .research-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 0.5rem; }
  .research-conf { font-size: 0.82rem; color: var(--gold); }

  /* CERTIFICATIONS */
  #certifications { background: var(--bg); }
  .cert-grid {
    max-width: 1100px; margin: 0 auto;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1rem;
  }
  .cert-item {
    padding: 1.5rem;
    background: var(--card);
    border: 1px solid rgba(201,168,76,0.1);
    display: flex; gap: 1rem; align-items: flex-start;
    transition: all 0.3s;
  }
  .cert-item:hover { border-color: rgba(201,168,76,0.3); background: var(--surface); }
  .cert-icon { font-size:
